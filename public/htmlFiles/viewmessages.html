<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../assets/GenPics/CPlogo.png">
    <title>View Suggestions | Closet Pilot</title>
    
    <link rel="stylesheet" type="text/css" href="../CSSfiles/main.css">
    
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">    <link href='https://cdn.boxicons.com/3.0.6/fonts/basic/boxicons.min.css' rel='stylesheet'>

    <style>
        .view-container {
            margin-top: 2rem;
            padding: 30px;
            background-color: rgba(1, 41, 101, 0.85); 
            border-radius: 15px;
            color: white;
            font-family: 'Onest', sans-serif;
            width: 90%;
            max-width: 1100px; /* Slightly wider to accommodate delete button */
            margin-left: auto;
            margin-right: auto;
        }

        h1#view-title {
            font-family: 'Racing Sans One';
            font-size: 4em;
            color: #012965;
            text-align: center;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            border-bottom: 2px solid white;
            padding: 12px;
            text-align: left;
            background-color: rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        main {
            margin-left: var(--sb-width);
            transition: margin-left 0.5s ease-in-out;
            padding: 2rem;
        }

        .btn-style {
            display: inline-block;
            text-decoration: none !important;
            font-family: Arial, sans-serif; 
            font-size: 13.33px; 
            color: black !important;
            padding: 5px 12px;
            border: 1px solid #767676;
            border-radius: 4px;
            background: linear-gradient(to bottom, #ffffff 0%, #e1e1e1 100%);
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-style:hover {
            background: linear-gradient(to bottom, #e1e1e1 0%, #cccccc 100%);
            border-color: #4f4f4f;
        }

        /* Styled Delete Button */
        .delete-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background-color: #cc0000;
        }
    </style>
</head>

<body>
    <header>
        <img src="../../assets/GenPics/CPlogo.png" alt="CP Logo" id="logo" style="float: left; height: 3em; width: 3em; margin-left: 1rem; margin-top: 0.5rem;">
        <p style="font-family: 'Dela Gothic One'; font-size: 5em; color: white; text-align: center; margin: 0;"> Closet Pilot </p>
    </header>

    <main>
        <div class="view-container">
            <div class="top-bar">
                <p id="totalCount">Total Suggestions: 0</p>
                <a href="contUs.html" class="btn-style">Back to Form</a>
            </div>
            
            <div id="tableContainer"></div>
        </div>
    </main>

    <footer>
        <p> &copy; Closet Pilot 2025 | <a href="sources.html">Sources</a></p>
    </footer>

    <script src="../jsFiles/other.js"></script>
    <script>
        // Function to delete a specific suggestion :D
        function deleteSuggestion(index) {
            if (confirm("Are you sure you want to delete this suggestion?")) {
                let suggestions = JSON.parse(localStorage.getItem('suggestionsData') || "[]");
                
                
                suggestions.splice(index, 1);
                
                
                localStorage.setItem('suggestionsData', JSON.stringify(suggestions));
                
                
                displayData();
            }
        }

        function displayData() {
            const container = document.getElementById('tableContainer');
            const totalText = document.getElementById('totalCount');
            const rawData = localStorage.getItem('suggestionsData');

            if (!rawData || JSON.parse(rawData).length === 0) {
                container.innerHTML = "<p style='text-align: center; padding: 20px;'>No suggestions found.</p>";
                totalText.innerText = "Total Suggestions: 0";
                return;
            }

            let suggestions = JSON.parse(rawData);
            totalText.innerText = `Total Suggestions: ${suggestions.length}`;

            let html = `<table>
                <tr>
                    <th>Date</th>
                    <th>Full Name</th>
                    <th>Discord</th>
                    <th>Email</th>
                    <th>Subject</th>
                    <th>Message</th>
                    <th>Action</th>
                </tr>`;

            
            suggestions.forEach((item, index) => {
                html += `<tr>
                    <td>${item.date}</td>
                    <td>${item.fullName}</td>
                    <td>${item.discord}</td>
                    <td>${item.email}</td>
                    <td>${item.subject}</td>
                    <td>${item.message}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteSuggestion(${index})">Delete</button>
                    </td>
                </tr>`;
            });

            html += `</table>`;
            container.innerHTML = html;
        }

        window.onload = displayData;
    </script>
</body>
</html>
